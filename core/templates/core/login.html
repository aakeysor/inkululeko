{% extends 'core/base.html' %}
{% block title %}Inkululeko — Sign In{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center -mt-8">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12
                        {{ config.bg }} rounded-xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor"
                     stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="10" r="3"/>
                    <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2
                             2 0 0 1 2 2v1.662"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-900">
                Sign in as {{ config.label }}
            </h1>
            <p class="text-gray-500 text-sm mt-1">
                Enter your credentials to continue
            </p>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">
                        Username
                    </label>
                    {{ form.username }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">
                        Password
                    </label>
                    {{ form.password }}
                </div>
                <button type="submit"
                        class="w-full py-2.5 {{ config.bg }} {{ config.hover }}
                               text-white font-medium rounded-lg text-sm
                               transition-colors">
                    Sign In
                </button>
            </form>
        </div>

        <div class="text-center mt-5">
            <a href="{% url 'landing' %}"
               class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
                ← Back to role selection
            </a>
        </div>
    </div>
</div>
{% endblock %}
