<button onclick="toggleChat()"
        id="chat-toggle"
        class="fixed bottom-6 right-6 w-14 h-14 bg-brand-600
               hover:bg-brand-700 text-white rounded-full shadow-lg
               shadow-brand-600/25 flex items-center justify-center
               transition-all hover:scale-105 z-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>
    </svg>
</button>

<div id="chat-panel"
     class="fixed bottom-24 right-6 w-96 bg-white rounded-2xl shadow-2xl
            border border-gray-200 z-50 hidden
            flex flex-col overflow-hidden"
     style="height: 480px;">

    <div class="px-5 py-4 border-b border-gray-100 bg-gray-50
                flex items-center justify-between shrink-0">
        <div>
            <p class="font-semibold text-gray-900 text-sm">
                Inkululeko Support
            </p>
            <p class="text-xs text-gray-400">
                Ask me anything about the site
            </p>
        </div>
        <button onclick="toggleChat()"
                class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <div id="chat-messages"
         class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
        <div class="flex gap-2">
            <div class="w-6 h-6 bg-brand-600 rounded-full flex items-center
                        justify-center shrink-0 mt-0.5">
                <span class="text-white text-xs font-bold">I</span>
            </div>
            <div class="bg-gray-100 rounded-xl rounded-tl-sm px-4 py-2.5
                        text-sm text-gray-700 max-w-[85%]">
                Hi! I'm the Inkululeko support assistant. How can I help
                you today?
            </div>
        </div>
    </div>

    <div class="px-4 py-3 border-t border-gray-100 shrink-0">
        <div class="flex gap-2">
            <input type="text" id="chat-input"
                   placeholder="Type a message..."
                   onkeydown="if(event.key==='Enter')sendMessage()"
                   class="flex-1 px-4 py-2.5 border border-gray-200
                          rounded-xl text-sm focus:outline-none
                          focus:ring-2 focus:ring-brand-500
                          focus:border-brand-500">
            <button onclick="sendMessage()"
                    class="bg-brand-600 hover:bg-brand-700 text-white
                           px-4 rounded-xl transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) {
        document.getElementById('chat-input').focus();
    }
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    const container = document.getElementById('chat-messages');

    container.innerHTML += `
        <div class="flex justify-end">
            <div class="bg-brand-600 text-white rounded-xl rounded-tr-sm
                        px-4 py-2.5 text-sm max-w-[85%]">
                ${msg}
            </div>
        </div>`;

    input.value = '';
    container.scrollTop = container.scrollHeight;

    const typingId = 'typing-' + Date.now();
    container.innerHTML += `
        <div id="${typingId}" class="flex gap-2">
            <div class="w-6 h-6 bg-brand-600 rounded-full flex items-center
                        justify-center shrink-0 mt-0.5">
                <span class="text-white text-xs font-bold">I</span>
            </div>
            <div class="bg-gray-100 rounded-xl rounded-tl-sm px-4 py-2.5
                        text-sm text-gray-400">
                Thinking...
            </div>
        </div>`;
    container.scrollTop = container.scrollHeight;

    try {
        const res = await fetch('/api/chat/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();

        document.getElementById(typingId).remove();
        container.innerHTML += `
            <div class="flex gap-2">
                <div class="w-6 h-6 bg-brand-600 rounded-full flex
                            items-center justify-center shrink-0 mt-0.5">
                    <span class="text-white text-xs font-bold">I</span>
                </div>
                <div class="bg-gray-100 rounded-xl rounded-tl-sm px-4
                            py-2.5 text-sm text-gray-700 max-w-[85%]">
                    ${data.response || data.error}
                </div>
            </div>`;
    } catch (err) {
        document.getElementById(typingId).remove();
        container.innerHTML += `
            <div class="flex gap-2">
                <div class="w-6 h-6 bg-red-500 rounded-full flex
                            items-center justify-center shrink-0 mt-0.5">
                    <span class="text-white text-xs font-bold">!</span>
                </div>
                <div class="bg-red-50 rounded-xl rounded-tl-sm px-4
                            py-2.5 text-sm text-red-700 max-w-[85%]">
                    Something went wrong. Please try again.
                </div>
            </div>`;
    }

    container.scrollTop = container.scrollHeight;
}

function getCookie(name) {
    let val = null;
    document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) {
            val = decodeURIComponent(c.substring(name.length + 1));
        }
    });
    return val;
}
</script>
